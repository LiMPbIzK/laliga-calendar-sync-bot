name: Prueba Forzada Telegram

on:
  workflow_dispatch:

jobs:
  test-envio:
    runs-on: ubuntu-latest
    steps:
    - name: Forzar Mensaje Directo
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        EQUIPO: ${{ secrets.EQUIPO_OBJETIVO }}
      run: |
        curl -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d "chat_id=${CHAT_ID}" \
          -d "parse_mode=Markdown" \
          -d "text=🚨 *¡Cambio de horario en la próxima jornada!*

          📌 *Partido:* ${EQUIPO} vs Rival Ejemplo (J1)
          ❌ *Antes:* 16/08 a las 18:00
          ✅ *Ahora:* 16/08 a las 21:00
          🏟️ *Lugar:* Estadio del encuentro"
